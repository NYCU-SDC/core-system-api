name: "Negative Form Lifecycle"
description: "Negative coverage for setup, form CRUD, workflow, questions, publishing, responses, and highlight validation."
cases:
  - name: "Invalid Organization Lookup"
    description: "Verify the API returns the expected not-found response for a non-existent organization slug."
    path: "01-setup-negative.http"
    test: "getOrgInvalidSlug"

  - name: "Form CRUD Validation"
    description: "Cover invalid form creation payloads together with non-existent form read and update requests."
    path: "02-form-creation-negative.http"
    test: "updateFormNonExistent"

  - name: "Forbidden Organization Access"
    description: "Verify form creation is forbidden for a non-member organization, then restore membership and clean up the test organization."
    path: "02a-form-creation-org-membership-negative.http"
    test: "deleteOrg"

  - name: "Workflow Validation"
    description: "Cover missing-form workflow operations and invalid workflow node payloads."
    path: "03-workflow-negative.http"
    test: "getSectionsNonExistentForm"

  - name: "Question Validation"
    description: "Cover invalid question payloads, ordering edge cases, and missing question resources."
    path: "04-question-management-negative.http"
    test: "getSectionsNonExistentForm"

  - name: "Publish Validation"
    description: "Verify publishing fails for invalid workflow states and non-existent publish targets."
    path: "05-publishing-negative.http"
    test: "publishFormNonExistent"

  - name: "Response Validation"
    description: "Cover invalid answer payloads, missing responses, missing forms, and cancellation edge cases."
    path: "06-response-creation-negative.http"
    test: "cancelDraftResponseSubmission"

  - name: "Highlight Validation"
    description: "Verify highlight APIs reject invalid question types, missing forms, and updates before configuration."
    path: "07-highlight-negative.http"
    test: "clearHighlightBeforeConfiguration"
