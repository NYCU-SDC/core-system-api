openapi: 3.1.0
info:
  title: Core System API
  version: '2026-04-27'
  description: |-
    ## Pages
    - [API Documentation (Redocly)](redocly/)
    - [API Documentation (Swagger UI)](swagger/)
    - [SDK Documentation (TypeDoc)](sdk/)
  termsOfService: https://sdc.nycu.club/terms
  contact:
    name: NYCU Software Development Club
    email: contact@sdc.nycu.club
    url: https://github.com/NYCU-SDC/core-system-api
  license:
    name: Apache-2.0
tags:
  - name: Healthz
  - name: Auth
  - name: User
  - name: Unit
  - name: Slug
  - name: Forms
  - name: Form Workflow
  - name: Responses
  - name: Files
paths:
  /api/auth/link-account:
    post:
      operationId: Auth_link
      summary: Link different OAuth accounts to the same user
      parameters:
        - name: name
          in: query
          required: true
          description: The name of the existing user.
          schema:
            type: string
          explode: false
        - name: oauthProvider
          in: query
          required: true
          description: The OAuth2 provider of the existing user.
          schema:
            $ref: '#/components/schemas/Auth.OAuthLoginProviders'
          explode: false
        - name: email
          in: query
          required: true
          description: The email of the existing user.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
        '401':
          description: Access is unauthorized.
      tags:
        - Auth
  /api/auth/link-account/abort:
    post:
      operationId: Auth_abortLink
      summary: Abort the account linking process
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        '401':
          description: Access is unauthorized.
      tags:
        - Auth
  /api/auth/login/internal:
    post:
      operationId: Auth_internalLogin
      summary: Internal Login (Debug)
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.InternalLoginResponse'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Auth.InternalLoginRequest'
        description: Login request with user ID.
  /api/auth/login/oauth/{oauthProvider}:
    get:
      operationId: Auth_loginGoogle
      summary: Login with OAuth Provider
      parameters:
        - name: oauthProvider
          in: path
          required: true
          description: The OAuth2 provider to use for login.
          schema:
            $ref: '#/components/schemas/Auth.OAuthLoginProviders'
        - name: c
          in: query
          required: true
          description: The callback URL of the OAuth2 login. [See details](https://clustron.atlassian.net/wiki/spaces/CS/pages/41320449/Authentication+Process)
          schema:
            type: string
          explode: false
        - name: r
          in: query
          required: false
          description: The redirect URL for login callback.
          schema:
            type: string
          explode: false
        - name: base
          in: query
          required: false
          description: Custom base URL for OAuth callback (only used in dev mode).
          schema:
            type: string
          explode: false
      responses:
        '302':
          description: Redirection
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Auth
  /api/auth/logout:
    post:
      operationId: Auth_logout
      summary: Logout User
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        '401':
          description: Access is unauthorized.
      tags:
        - Auth
  /api/auth/refresh:
    post:
      operationId: Auth_refreshToken
      summary: Refresh Access Token
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Auth
  /api/files:
    get:
      operationId: Files_listFiles
      summary: List All Files
      description: List all files with pagination. Requires authentication.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of files to return. Defaults to 20.
          schema:
            type: integer
            format: int32
          explode: false
        - name: offset
          in: query
          required: false
          description: Number of files to skip. Defaults to 0.
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Files.ListFilesResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - Files
  /api/files/me:
    get:
      operationId: Files_listMyFiles
      summary: List My Files
      description: List files uploaded by the currently authenticated user.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Files.FileResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - Files
  /api/files/{id}:
    get:
      operationId: Files_downloadFile
      summary: Download File
      description: Download a file by its ID. Returns the raw file content with appropriate Content-Type and Content-Disposition headers.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          headers:
            Content-Disposition:
              required: true
              schema:
                type: string
          content:
            '*/*':
              schema:
                contentMediaType: '*/*'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Files
    delete:
      operationId: Files_deleteFile
      summary: Delete a File
      description: Delete a file by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Files
  /api/files/{id}/info:
    get:
      operationId: Files_getFileInfo
      summary: Get File Info
      description: Get metadata of a file by its ID, without downloading the binary content.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Files.FileResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Files
  /api/forms:
    get:
      operationId: Forms_listForms
      summary: List Forms
      description: List all existing forms.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Forms.Form'
      tags:
        - Forms
  /api/forms/fonts:
    get:
      operationId: Forms_getFormFonts
      summary: Get Form Fonts
      description: Get available fonts list for forms dressing.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Forms.Font'
      tags:
        - Forms
  /api/forms/google-sheet-email:
    get:
      operationId: Forms_getGoogleSheetEmail
      summary: Get Google Sheet Email
      description: Get the Gmail address that should be added to Google Sheet permissions. This address needs to be granted access to the Google Sheet so the system can modify the form.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.GoogleSheetEmailResponse'
      tags:
        - Forms
  /api/forms/google-sheet/verify:
    post:
      operationId: Forms_verifyGoogleSheet
      summary: Verify Google Sheet
      description: Verify the Google Sheet URL and whether the system can access it.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.GoogleSheetVerifyResponse'
      tags:
        - Forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Forms.GoogleSheetVerifyRequest'
  /api/forms/me:
    get:
      operationId: Unit_listFormsOfCurrentUser
      summary: List Forms of Current User
      description: List all forms of current user
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unit.UserFormListResponse'
      tags:
        - Unit
  /api/forms/{formId}:
    get:
      operationId: Forms_getFormById
      summary: Get Form
      description: Get a specific form by its unique identifier. Description fields are returned as ProseMirror JSON for admin editing, with rendered HTML available in `descriptionHtml` for frontend display.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.Form'
      tags:
        - Forms
    patch:
      operationId: Forms_updateForm
      summary: Update Form
      description: Update an existing form by its unique identifier. Description fields in the request body should be sent as ProseMirror JSON from the Tiptap editor.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.Form'
      tags:
        - Forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Forms.FormRequestUpdate'
    delete:
      operationId: Forms_deleteForm
      summary: Delete Form
      description: Delete an existing form by its unique identifier.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Forms
  /api/forms/{formId}/archive:
    post:
      operationId: Forms_archiveForm
      summary: Archive Form
      description: Archive a form. Set status to 'ARCHIVED'. Archived forms are hidden from default lists.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.Form'
      tags:
        - Forms
  /api/forms/{formId}/cover:
    get:
      operationId: Forms_getFormCoverImage
      summary: Get Form Cover Image
      description: Get the cover image binary data. Returns the image in WebP format.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            image/webp:
              schema:
                contentMediaType: image/webp
      tags:
        - Forms
    post:
      operationId: Forms_uploadFormCoverImage
      summary: Upload Form Cover Image
      description: 'Upload a cover image for a form. The frontend should send images in WebP format with max-width/height: 1800px and quality 80%.'
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.FormCoverUploadResponse'
      tags:
        - Forms
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Forms.FormCoverUploadRequest'
            encoding:
              coverImage:
                contentType: application/json
  /api/forms/{formId}/publish:
    post:
      operationId: Forms_publishForm
      summary: Publish Form
      description: Publish a form. Set status to 'published'.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.FormPublishResponse'
      tags:
        - Forms
  /api/forms/{formId}/responses:
    post:
      operationId: Responses_createFormResponse
      summary: Create Form Response
      description: Create a new response of a form.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.CreateResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Responses
    get:
      operationId: Responses_listFormResponses
      summary: List Form Responses
      description: List all responses for a specific form.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.ListResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Responses
  /api/forms/{formId}/responses/me:
    get:
      operationId: Responses_getMyFormResponses
      summary: Get My Form Responses
      description: Get all responses submitted by the currently logged-in user for a specific form.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.ListResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Responses
  /api/forms/{formId}/responses/{responseId}:
    get:
      operationId: Responses_getFormResponse
      summary: Get Form Response
      description: Get the preview answer by response ID.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
        - name: responseId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Responses.GetFormResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Responses
    delete:
      operationId: Responses_deleteFormResponse
      summary: Delete Form Response
      description: Delete a response and all its associated data.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
        - name: responseId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Responses
  /api/forms/{formId}/sections:
    get:
      operationId: Forms_listSections
      summary: List Sections
      description: List all the questions of the sections in the form. Descriptions are returned as ProseMirror JSON for admin editing, with rendered HTML available in `descriptionHtml` for frontend form display and preview.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Forms.SectionBundle'
      tags:
        - Forms
  /api/forms/{formId}/sections/{sectionId}:
    patch:
      operationId: Forms_updateSection
      summary: Update Section
      description: Update an existing section by its unique identifier. Description fields in the request body should be sent as ProseMirror JSON from the Tiptap editor.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
        - name: sectionId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.Section'
      tags:
        - Forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Forms.SectionRequest'
  /api/forms/{formId}/unarchive:
    post:
      operationId: Forms_unarchiveForm
      summary: Unarchive Form
      description: Unarchive a form. Set status to 'DRAFT'.
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forms.Form'
      tags:
        - Forms
  /api/forms/{formId}/workflow:
    get:
      operationId: FormWorkflow_getWorkflow
      summary: Get Workflow
      description: Get workflow for a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormWorkflow.GetWorkflowResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Form Workflow
    put:
      operationId: FormWorkflow_updateWorkflow
      summary: Update Workflow
      description: Update workflow for a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FormWorkflow.NodeResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Form Workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/FormWorkflow.NodeRequest'
  /api/forms/{formId}/workflow/nodes:
    post:
      operationId: FormWorkflow_createNode
      summary: Create Workflow Node
      description: Create a new node for a workflow
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormWorkflow.NodeStructure'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Form Workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormWorkflow.CreateNodeRequest'
  /api/forms/{formId}/workflow/nodes/{nodeId}:
    delete:
      operationId: FormWorkflow_deleteNode
      summary: Delete Workflow Node
      description: Delete a node for a workflow
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
        - name: nodeId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Form Workflow
  /api/healthz:
    get:
      operationId: Healthz_checkHealthz
      summary: Check Health Status
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Healthz
  /api/oauth/callback/{provider}:
    get:
      operationId: Responses_oauthAnswerCallback
      summary: OAuth Callback for Question Binding
      description: "\tOAuth provider redirects here after the user authorizes (or denies) the connection.\n\tThe server exchanges the code for profile data, stores it as the answer for the question encoded in `state`, then redirects the user to `r`.\n\n\tThe redirect URL (`r`) will always receive the following query parameters:\n\n\t| Parameter | Values | Description |\n\t|-----------|--------|-------------|\n\t| `status`  | `success` \\| `error` | Outcome of the OAuth flow. |\n\t| `error`   | OAuth error code (e.g. `access_denied`) | Only present when `status=error`. |\n\n\t**Example redirects:**\n\t- Success: `{r}?status=success`\n\t- Failure: `{r}?status=error&error=access_denied`"
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Auth.OAuthProviders'
        - name: code
          in: query
          required: false
          description: Authorization code returned by the OAuth provider on success.
          schema:
            type: string
          explode: false
        - name: state
          in: query
          required: false
          description: Opaque state value created during initiation; encodes responseId, questionId, and redirect URL.
          schema:
            type: string
          explode: false
        - name: error
          in: query
          required: false
          description: Error code returned by the OAuth provider when the user denied authorization (e.g. `access_denied`).
          schema:
            type: string
          explode: false
      responses:
        '302':
          description: Redirection
          headers:
            location:
              required: true
              schema:
                type: string
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
      tags:
