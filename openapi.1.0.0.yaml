    Forms.QuestionRequest:
      type: object
      required:
        - required
        - type
        - title
        - description
        - order
      properties:
        required:
          type: boolean
          description: Whether the question is required to answer or not.
        type:
          allOf:
            - $ref: '#/components/schemas/Forms.QuestionTypes'
          description: The type of the question.
        title:
          type: string
          description: What is the question.
        description:
          allOf:
            - $ref: '#/components/schemas/ProseMirrorDocument'
          description: The question description as ProseMirror JSON, edited in Tiptap and sent by the admin interface.
        order:
          type: integer
          format: int32
          description: The desired position of this question within the section (1-indexed). On create, clamped to `[1, currentCount + 1]`; on update, clamped to `[1, totalCount]`. The server automatically shifts other questions to maintain a contiguous order sequence.
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Forms.ChoiceOption'
          description: Available choice options for single_choice, multiple_choice, dropdown, and ranking questions.
        scale:
          allOf:
            - $ref: '#/components/schemas/Forms.ScaleOption'
          description: Available options for linear scale and rating questions.
        uploadFile:
          allOf:
            - $ref: '#/components/schemas/Forms.UploadFileOption'
          description: Available options for file upload questions.
        date:
          allOf:
            - $ref: '#/components/schemas/Forms.DateOption'
          description: Available options for date questions.
        oauthConnect:
          allOf:
            - $ref: '#/components/schemas/Auth.OAuthProviders'
          description: Available options for OAuth connect questions.
        sourceId:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: If set, choices are dynamically generated from answers to this question.
      description: The request body for creating/updating a question.
      examples:
        - required: true
          type: DATE
          title: Which year did you join?
          description:
            type: doc
            content:
              - type: paragraph
                content:
                  - type: text
                    text: Select year and month only
          order: 14
          date:
            hasYear: true
            hasMonth: true
            hasDay: false
        - required: true
          type: DATE
          title: When will you graduate?
          description:
            type: doc
            content:
              - type: paragraph
                content:
                  - type: text
                    text: Please select your graduation date
          order: 13
