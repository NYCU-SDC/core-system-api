        $ref: '#/components/schemas/Unit.UserForm'
      description: Response model for listing all forms of current user
      examples:
        - - id: 5a1b2c3d-4e5f-6789-0abc-def123456789
            title: Annual Survey 2026
            deadline: '2026-03-31T23:59:59Z'
            status: NOT_STARTED
          - id: 9a843aa0-8451-4e3b-b6a0-8c0e994e9040
            title: SDC 2025 Recruitment Form
            deadline: '2025-03-31T23:59:59Z'
            status: IN_PROGRESS
            responseIds:
              - a12b3c4d-5e6f-7a8b-9c0d-e1f2a3b4c5d6
          - id: 7f6e5d4c-3b2a-1098-7654-321fedcba098
            title: Member Information Update 2025
            deadline: '2025-02-15T23:59:59Z'
            status: COMPLETED
            responseIds:
              - b23c4d5e-6f7a-8b9c-0d1e-f2a3b4c5d6e7
              - c34d5e6f-7a8b-9c0d-1e2f-a3b4c5d6e7f8
    Unit.UserFormStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
      description: The completion status of the form for the user
    User.OnboardingRequest:
      type: object
      required:
        - username
        - name
      properties:
        username:
          type: string
          description: The user's username, can change, but must be unique across the system.
        name:
          type: string
          minLength: 4
          maxLength: 15
          pattern: ^\w+$
          description: The user's nickname.
      examples:
        - username: jane_smith
          name: Jane Smith
    User.Role:
      type: string
      enum:
        - USER
    User.User:
      type: object
      required:
        - id
        - username
        - name
        - avatarUrl
        - emails
        - roles
        - require_onboarding
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: The user's unique identifier.
        username:
          type: string
          minLength: 4
          maxLength: 15
          pattern: ^\w+$
          description: The user's username, can change, but must be unique across the system.
        name:
          type: string
          maxLength: 15
          description: The user's nickname.
        avatarUrl:
          type: string
          description: Avatar URL of the user.
        emails:
          type: array
          items:
            type: string
          description: Email addresses associated with the user.
        roles:
          type: array
          items:
            $ref: '#/components/schemas/User.Role'
          description: Global role of the user.
        require_onboarding:
          type: boolean
          description: The user needs to onboard and has not completed onboarding yet.
      examples:
        - id: 3c5fa073-7b97-43a3-bc44-ddc98f390a08
          username: john_doe
          name: John Doe
          avatarUrl: https://avatars.githubusercontent.com/u/12345678
          emails:
            - john.doe@example.com
            - john@gmail.com
          roles:
            - USER
          require_onboarding: true
    Versions:
      type: string
      enum:
        - 1.0.0
    uuid:
      type: string
      format: uuid
