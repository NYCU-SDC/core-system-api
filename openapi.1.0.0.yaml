components:
  schemas:
    Auth.InternalLoginRequest:
      type: object
      required:
        - uid
      properties:
        uid:
          type: string
          description: The user ID to login as.
      examples:
        - uid: 3c5fa073-7b97-43a3-bc44-ddc98f390a08
    Auth.InternalLoginResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Login status message.
      examples:
        - message: Login successful
    Auth.OAuthLoginProviders:
      type: string
      enum:
        - GOOGLE
        - NYCU
    Auth.OAuthProviders:
      type: string
      enum:
        - GOOGLE
        - GITHUB
    Auth.RefreshToken:
      type: object
      required:
        - accessToken
        - expirationTime
        - refreshToken
      properties:
        accessToken:
          type: string
          description: The access token and formatted as JWT
        expirationTime:
          type: integer
          description: The expiration date of the refresh token.
        refreshToken:
          type: string
          description: The new refresh token.
      examples:
        - accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          expirationTime: 1735689600
          refreshToken: d290f1ee-6c54-4b01-90e6-d701748f0851
    BadRequest:
      type: object
      required:
        - title
        - status
        - type
        - detail
      properties:
        title:
          type: string
          enum:
            - Bad Request
        status:
          type: number
          enum:
            - 400
        type:
          type: string
          enum:
            - https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/400
        detail:
          type: string
      examples:
        - title: Bad Request
          status: 400
          type: https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/400
          detail: The request body contains invalid data
    Files.FileResponse:
      type: object
      required:
        - id
        - originalFilename
        - contentType
        - size
        - createdAt
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: The unique identifier of the file.
        originalFilename:
          type: string
          description: The original filename as provided by the client.
        contentType:
          type: string
          description: The MIME content type of the file.
        size:
          type: integer
          format: int64
